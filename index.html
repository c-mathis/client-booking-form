<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Your Appointment</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
            background: #f4f4f4;
            max-width: 600px;
            margin: auto;
        }

        h1 {
            text-align: center;
        }

        form {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
        }

        label {
            display: block;
            margin: 1rem 0 0.25rem;
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            background: #0070f3;
            color: white;
            border: none;
            padding: 1rem;
            width: 100%;
            border-radius: 4px;
            font-size: 1rem;
        }
    </style>
</head>

<body>
    <h1>Book Your Appointment</h1>
    <form id="booking-form" method="POST" action="https://appointment-worker.cameron-07f.workers.dev/">
        <label for="name">Your Name</label>
        <input type="text" name="name" id="name" required />

        <label for="email">Your Email</label>
        <input type="email" name="email" id="email" required />

        <label for="phone">Phone Number</label>
        <input type="tel" name="phone" id="phone" />

        <label for="selectedTime">Preferred Appointment Time</label>
        <input type="datetime-local" name="selectedTime" id="selectedTime" required />

        <!-- Hidden Case Manager Email from URL Param -->
        <input type="hidden" name="caseManagerEmail" id="caseManagerEmail" />

        <button type="submit">Book Appointment</button>
    </form>

    <script>
        // Pull `?cm=email` from URL and insert into hidden field
        const params = new URLSearchParams(window.location.search);
        const cmEmail = params.get('cm');
        if (cmEmail) {
            document.getElementById('caseManagerEmail').value = cmEmail;
        }
    </script>
</body>

</html>
