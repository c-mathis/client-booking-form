<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Your Appointment</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
            background: #f4f4f4;
            max-width: 600px;
            margin: auto;
        }

        h1 {
            text-align: center;
        }

        form {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
        }

        label {
            display: block;
            margin: 1rem 0 0.25rem;
            font-weight: bold;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }

        .slot-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .slot {
            padding: 0.5rem;
            background: #eee;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
        }

        .slot:hover {
            background: #ddd;
        }

        .slot.disabled {
            background: #ccc;
            cursor: not-allowed;
            pointer-events: none;
        }

        .slot.selected {
            background: #0070f3;
            color: white;
        }
    </style>
</head>

<body>
    <h1>Book Your Appointment</h1>
    <form id="booking-form" method="POST" action="https://appointment-worker.cameron-07f.workers.dev/">
        <label for="name">Your Name</label>
        <input type="text" name="name" id="name" required />

        <label for="email">Your Email</label>
        <input type="email" name="email" id="email" required />

        <label for="phone">Phone Number</label>
        <input type="tel" name="phone" id="phone" />

        <label for="date">Select a Date</label>
        <input type="date" id="date" required />

        <div id="time-label" style="display:none;"><strong>Pick a Time:</strong></div>
        <div id="time-grid" class="slot-grid"></div>

        <!-- Hidden fields -->
        <input type="hidden" name="selectedTime" id="selectedTime" />
        <input type="hidden" name="cm" id="cm" />

        <button type="submit">Book Appointment</button>
    </form>

    <script>
        const cm = new URLSearchParams(window.location.search).get('cm');
        if (!cm) alert("Missing ?cm= parameter");
        document.getElementById('cm').value = cm;

        const dateInput = document.getElementById('date');
        const grid = document.getElementById('time-grid');
        const selectedTimeInput = document.getElementById('selectedTime');
        const timeLabel = document.getElementById('time-label');

        let selectedSlot = null;

        dateInput.addEventListener('change', async () => {
            const selectedDate = dateInput.value;
            if (!selectedDate || !cm) return;

            const res = await fetch(`https://appointment-worker.cameron-07f.workers.dev/availability?cm=${encodeURIComponent(cm)}`);
            const { busy } = await res.json();

            const selectedDay = new Date(selectedDate);
            const busySet = new Set(
                busy
                    .map(b => new Date(b.start))
                    .filter(d => d.toDateString() === selectedDay.toDateString())
                    .map(d => d.getHours() * 60 + d.getMinutes())
            );

            // Generate slots from 9 AM to 5 PM, every 30 min
            const slots = [];
            for (let h = 9; h < 17; h++) {
                slots.push(`${h.toString().padStart(2, '0')}:00`);
                slots.push(`${h.toString().padStart(2, '0')}:30`);
            }

            grid.innerHTML = '';
            timeLabel.style.display = 'block';

            slots.forEach(time => {
                const [hour, minute] = time.split(':').map(Number);
                const slotDate = new Date(selectedDate);
                slotDate.setHours(hour, minute, 0, 0);

                const minsSinceMidnight = hour * 60 + minute;
                const isBusy = busySet.has(minsSinceMidnight);

                const div = document.createElement('div');
                div.textContent = time;
                div.className = 'slot' + (isBusy ? ' disabled' : '');
                if (!isBusy) {
                    div.addEventListener('click', () => {
                        document.querySelectorAll('.slot').forEach(el => el.classList.remove('selected'));
                        div.classList.add('selected');
                        selectedSlot = slotDate;
                        selectedTimeInput.value = slotDate.toISOString();
                    });
                }
                grid.appendChild(div);
            });

            if (grid.innerHTML.trim() === "") {
                grid.innerHTML = "<div>No available time slots today.</div>";
            }
        });
    </script>
</body>

</html>
