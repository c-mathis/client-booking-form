<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Your Appointment</title>
</head>

<body style="font-family: sans-serif; padding: 2rem; max-width: 500px; margin: auto;">
    <h2>📅 Schedule Your Appointment</h2>
    <form id="bookingForm">
        <label>Name:<br>
            <input type="text" name="name" required>
        </label><br><br>

        <label>Email:<br>
            <input type="email" name="email" required>
        </label><br><br>

        <label>Phone:<br>
            <input type="text" name="phone">
        </label><br><br>

        <label>Select Time:<br>
            <input type="datetime-local" name="selectedTime" required>
        </label><br><br>

        <input type="hidden" name="caseManagerEmail" value="calendar@fivestartaxhelp.com">

        <button type="submit">Book Appointment</button>
    </form>

    <p id="responseMessage" style="margin-top: 1rem;"></p>

    <script>
        document.getElementById("bookingForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const form = e.target;
            const data = Object.fromEntries(new FormData(form).entries());

            const response = await fetch("https://appointment-worker.cameron-07f.workers.dev", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            document.getElementById("responseMessage").innerText = result.message || "Submitted!";
        });
    </script>
</body>

</html>
