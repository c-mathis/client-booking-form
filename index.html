<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Your Appointment</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
            background: #f4f4f4;
            max-width: 600px;
            margin: auto;
        }

        h1 {
            text-align: center;
        }

        form {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
        }

        label {
            display: block;
            margin: 1rem 0 0.25rem;
            font-weight: bold;
        }

        input,
        button {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .time-slot {
            padding: 0.5rem;
            background: #e0e0e0;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
        }

        .time-slot.selected {
            background-color: #0070f3;
            color: white;
        }

        .time-slot.disabled {
            background-color: #ccc;
            color: #777;
            cursor: not-allowed;
        }

        button {
            background: #0070f3;
            color: white;
            font-size: 1rem;
            border: none;
        }
    </style>
</head>

<body>
    <h1>Book Your Appointment</h1>
    <form id="booking-form" method="POST" action="https://appointment-worker.cameron-07f.workers.dev/">
        <label for="name">Your Name</label>
        <input type="text" name="name" id="name" required />

        <label for="email">Your Email</label>
        <input type="email" name="email" id="email" required />

        <label for="phone">Phone Number</label>
        <input type="tel" name="phone" id="phone" />

        <label>Pick a Time</label>
        <div class="time-grid" id="time-grid"></div>

        <input type="hidden" name="selectedTime" id="selectedTime" />
        <input type="hidden" name="caseManagerEmail" id="caseManagerEmail" />

        <button type="submit">Book Appointment</button>
    </form>

    <script>
        const params = new URLSearchParams(window.location.search);
        const cmEmail = params.get("cm");
        if (cmEmail) {
            document.getElementById("caseManagerEmail").value = cmEmail;
        }

        const grid = document.getElementById("time-grid");
        const selectedTimeInput = document.getElementById("selectedTime");

        const today = new Date();
        const times = [];

        // Build slots: 9am to 4:30pm every 30 mins
        for (let hour = 9; hour <= 16; hour++) {
            times.push(`${String(hour).padStart(2, "0")}:00`);
            times.push(`${String(hour).padStart(2, "0")}:30`);
        }

        async function getBusySlots(email) {
            const res = await fetch(`https://appointment-worker.cameron-07f.workers.dev/?check=1&cm=${encodeURIComponent(email)}`);
            if (!res.ok) return [];
            const { busy = [] } = await res.json();
            return busy;
        }

        function formatDateTime(hourMinute) {
            const [hour, minute] = hourMinute.split(":").map(Number);
            const slotDate = new Date(today.getFullYear(), today.getMonth(), today.getDate(), hour, minute);
            return slotDate.toISOString();
        }

        function renderSlots(disabledTimes = []) {
            grid.innerHTML = "";
            times.forEach((t) => {
                const slotEl = document.createElement("div");
                slotEl.textContent = t;
                slotEl.className = "time-slot";

                const iso = formatDateTime(t);
                if (disabledTimes.includes(iso)) {
                    slotEl.classList.add("disabled");
                } else {
                    slotEl.addEventListener("click", () => {
                        document.querySelectorAll(".time-slot").forEach((el) => el.classList.remove("selected"));
                        slotEl.classList.add("selected");
                        selectedTimeInput.value = iso;
                    });
                }

                grid.appendChild(slotEl);
            });
        }

        (async () => {
            if (!cmEmail) {
                renderSlots();
                return;
            }
            const disabledSlots = await getBusySlots(cmEmail);
            renderSlots(disabledSlots);
        })();
    </script>
</body>

</html>
